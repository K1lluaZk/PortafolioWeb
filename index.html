<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Coming Soon</title>

  <style>
    body {
      background: #050505;
      overflow: hidden;
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-repeat: repeat;
      background-size: 300px 300px;
    }

    .stars {
      position: fixed;
      inset: 0;

      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 40% 60%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 10% 90%, rgba(255,255,255,0.8), transparent);

      animation: twinkle 6s ease-in-out infinite;
    }

    .stars::before {
      background-image:
        radial-gradient(2px 2px at 15% 70%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 55% 40%, rgba(255,255,255,0.7), transparent);

      animation: twinkle 4s ease-in-out infinite reverse;
      opacity: 0.5;
    }

    .stars::after {
      background-image:
        radial-gradient(2px 2px at 35% 20%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 85% 55%, rgba(255,255,255,0.8), transparent);

      animation: twinkle 8s ease-in-out infinite;
      opacity: 0.4;
    }

    .glow {
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);

      width: 500px;
      height: 500px;

      background: rgba(255, 255, 255, 0.03);
      border-radius: 9999px;
      filter: blur(120px);
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
      }

      25% {
        opacity: 0.5;
      }

      50% {
        opacity: 0.8;
      }

      75% {
        opacity: 0.4;
      }
    }
  </style>
</head>

<body class="text-white">

  <div class="stars"></div>
  <div class="glow"></div>

  <main class="relative z-10 flex items-center justify-center min-h-screen">
    <div class="text-center">
      <h1 class="text-5xl md:text-7xl font-bold tracking-[0.3em]">
        COMING SOON
      </h1>

      <p class="mt-5 text-gray-500 uppercase tracking-[0.4em] text-xs">
        Portfolio under construction
      </p>
    </div>
  </main>

</body>
</html>
